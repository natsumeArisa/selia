        // 渲染游戏卡片
        function renderGames(gameList) {
            const gamesGrid = document.getElementById('gamesGrid');
            gamesGrid.innerHTML = '';
            
            gameList.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                
                // 创建标签HTML
                const tagsHTML = game.tags.map(tag => 
                    `<span class="game-tag">${tag}</span>`
                ).join('');
                
                gameCard.innerHTML = `
                    <div class="game-image">
                        <img src="${game.imageUrl}" alt="${game.title}封面">
                    </div>
                    <div class="game-content">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                        <div class="game-meta">
                            <span><i class="fas fa-download"></i> ${game.downloads}</span>
                            <span><i class="fas fa-star"></i> ${game.rating}</span>
                        </div>
                        <a href="${game.downloadUrl}" class="download-btn" target="_blank">
                            <i class="fas fa-download"></i> 下载资源
                        </a>
                    </div>
                `;
         gamesGrid.appendChild(gameCard);
            });
        }

        // 搜索功能
        function searchGames(query) {
            if (!query) return games;
            
            const lowerQuery = query.toLowerCase();
            return games.filter(game => 
                game.title.toLowerCase().includes(lowerQuery) ||
                game.description.toLowerCase().includes(lowerQuery) ||
                game.tags.some(tag => tag.toLowerCase().includes(lowerQuery))
            );
        }

        // 页面加载时渲染游戏
        document.addEventListener('DOMContentLoaded', () => {
            renderGames(games);
            
            // 搜索按钮事件
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchInput').value;
                const results = searchGames(query);
                renderGames(results);
            });
            
            // 输入框回车事件
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    const query = document.getElementById('searchInput').value;
                    const results = searchGames(query);
                    renderGames(results);
                }
            });
        });
    </script>
</body>
</html>
